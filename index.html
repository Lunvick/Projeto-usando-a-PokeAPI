<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>

  <header>
    <img src="https://raw.githubusercontent.com/PokeAPI/media/master/logo/pokeapi_256.png" alt="Logo Pokémon" class="logo">
    <h1>Pokédex</h1>
    <p>Projeto usando a PokéAPI</p>
  </header>

  <main>
    <section class="busca">
      <input type="text" id="pokemonInput" placeholder="Digite o nome ou número do Pokémon">
      <button id="btnBuscar">Buscar</button>
    </section>

    <section id="resultado" class="resultado">
      <p>Pesquise um Pokémon para ver as informações.</p>
    </section>
  </main>
   <script src="script.js"></script>
</body>
</html>
